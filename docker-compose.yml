version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ttt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ttt_user
      POSTGRES_PASSWORD: ttt_password
      POSTGRES_DB: ttt_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttt_user -d ttt_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
